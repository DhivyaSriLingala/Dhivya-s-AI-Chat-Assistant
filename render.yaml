services:
  - type: web
    name: dhivya-ai-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You will paste this manually in the Render dashboard
    autoDeploy: true
